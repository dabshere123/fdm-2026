<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0"/>
  <title>FDM 2026 — App Walkthrough</title>
  <meta name="theme-color" content="#0a0a14"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{font-family:'DM Sans',sans-serif;background:#0a0a14;color:#f1f5f9;min-height:100vh;overflow-x:hidden;}
    .screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;text-align:center;position:relative;}
    .progress{position:fixed;top:0;left:0;right:0;height:4px;background:rgba(255,255,255,0.08);z-index:100;}
    .progress-bar{height:100%;background:linear-gradient(90deg,#7c3aed,#38bdf8);transition:width 0.4s ease;}
    .step-label{position:fixed;top:12px;right:16px;font-size:11px;font-weight:700;color:#475569;z-index:100;}
    .skip{position:fixed;top:8px;left:16px;font-size:12px;font-weight:700;color:#475569;cursor:pointer;padding:4px 8px;z-index:100;background:rgba(255,255,255,0.04);border-radius:6px;border:1px solid rgba(255,255,255,0.08);}
    .emoji{font-size:64px;margin-bottom:16px;display:block;}
    h1{font-size:26px;font-weight:900;margin-bottom:10px;line-height:1.2;}
    h2{font-size:20px;font-weight:800;margin-bottom:8px;}
    p{font-size:15px;color:#94a3b8;line-height:1.7;max-width:340px;margin:0 auto 20px;}
    .btn{display:block;width:100%;max-width:340px;padding:18px;border-radius:14px;border:none;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;font-size:17px;font-weight:900;cursor:pointer;font-family:inherit;margin:0 auto;}
    .btn.blue{background:linear-gradient(135deg,#0ea5e9,#0284c7);}
    .btn.red{background:linear-gradient(135deg,#dc2626,#b91c1c);}
    .btn.green{background:linear-gradient(135deg,#16a34a,#15803d);}
    .btn.amber{background:linear-gradient(135deg,#d97706,#b45309);}
    .btn.outline{background:none;border:2px solid rgba(255,255,255,0.2);color:#f1f5f9;}
    .btn+.btn{margin-top:10px;}
    /* Phone mockup */
    .phone{width:260px;border-radius:28px;border:3px solid rgba(255,255,255,0.15);background:#0d0d1a;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.5);margin:0 auto 24px;}
    .phone-bar{background:#0d0d1a;padding:8px 16px 4px;display:flex;justify-content:space-between;align-items:center;}
    .phone-bar span{font-size:10px;color:#475569;}
    .phone-screen{padding:10px;min-height:360px;display:flex;flex-direction:column;}
    /* Simulated app elements */
    .app-hdr{background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.06);padding:10px;margin:-10px -10px 10px;display:flex;align-items:center;gap:8px;}
    .app-hdr-name{font-size:13px;font-weight:800;color:#f1f5f9;}
    .app-hdr-role{font-size:10px;color:#64748b;}
    .call-btn{border-radius:10px;padding:10px;display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer;border:2px solid;}
    .call-btn.medical{background:rgba(147,51,234,0.15);border-color:rgba(147,51,234,0.5);}
    .call-btn.fire{background:rgba(220,38,38,0.15);border-color:rgba(220,38,38,0.5);}
    .call-btn.security{background:rgba(37,99,235,0.15);border-color:rgba(37,99,235,0.5);}
    .call-btn.lost{background:rgba(234,179,8,0.15);border-color:rgba(234,179,8,0.5);}
    .call-btn-icon{font-size:20px;}
    .call-btn-text{font-size:11px;font-weight:800;color:#f1f5f9;}
    .call-btn-sub{font-size:9px;color:#94a3b8;margin-top:1px;}
    .form-field{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:11px;color:#f1f5f9;text-align:left;}
    .form-label{font-size:9px;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px;}
    .submit-btn{width:100%;background:rgba(220,38,38,0.8);border:none;border-radius:8px;padding:10px;color:#fff;font-size:12px;font-weight:900;cursor:pointer;font-family:inherit;}
    /* Alert card */
    .alert-card{border-radius:12px;padding:10px 12px;border:2px solid;margin-bottom:6px;animation:slideIn 0.4s ease;}
    @keyframes slideIn{from{transform:translateY(-10px);opacity:0;}to{transform:translateY(0);opacity:1;}}
    .alert-card.medical{background:rgba(30,64,175,0.2);border-color:rgba(59,130,246,0.7);}
    .alert-card.fire{background:rgba(220,38,38,0.2);border-color:rgba(239,68,68,0.7);}
    .alert-card.security{background:rgba(15,23,42,0.7);border-color:rgba(100,116,139,0.6);}
    .alert-type{font-size:10px;font-weight:900;color:#93c5fd;text-transform:uppercase;letter-spacing:0.08em;}
    .alert-loc{font-size:12px;font-weight:800;color:#f1f5f9;margin:2px 0;}
    .alert-prob{font-size:10px;color:#94a3b8;}
    .alert-new{background:#ef4444;color:#fff;font-size:8px;font-weight:900;border-radius:4px;padding:1px 5px;display:inline-block;margin-left:6px;}
    /* Broadcast banner */
    .broadcast-banner{background:linear-gradient(135deg,rgba(249,115,22,0.2),rgba(234,88,12,0.15));border:2px solid rgba(249,115,22,0.6);border-radius:10px;padding:10px;margin-bottom:8px;animation:slideIn 0.5s ease;}
    .broadcast-header{font-size:10px;font-weight:900;color:#fb923c;margin-bottom:4px;}
    .broadcast-msg{font-size:11px;color:#f1f5f9;line-height:1.5;}
    .reply-box{display:flex;gap:4px;margin-top:6px;}
    .reply-inp{flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:6px 8px;font-size:10px;color:#f1f5f9;font-family:inherit;}
    .reply-send{background:rgba(249,115,22,0.8);border:none;border-radius:6px;padding:6px 10px;color:#fff;font-size:10px;font-weight:900;cursor:pointer;}
    /* Hub side panel */
    .hub-panel{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:10px;margin-bottom:8px;}
    .hub-label{font-size:9px;font-weight:900;color:#374151;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
    .hub-active{background:rgba(30,64,175,0.15);border:2px solid rgba(59,130,246,0.6);border-radius:8px;padding:8px;position:relative;}
    .hub-active-type{font-size:10px;font-weight:900;color:#93c5fd;}
    .hub-active-loc{font-size:11px;font-weight:800;color:#f1f5f9;margin:2px 0;}
    .hub-active-btns{display:flex;gap:4px;margin-top:6px;}
    .hub-active-btn{flex:1;border-radius:6px;padding:5px;border:none;font-size:9px;font-weight:800;cursor:pointer;}
    /* Tags */
    .tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin:4px 2px;}
    .tag.purple{background:rgba(139,92,246,0.2);color:#c4b5fd;border:1px solid rgba(139,92,246,0.3);}
    .tag.blue{background:rgba(14,165,233,0.15);color:#38bdf8;border:1px solid rgba(14,165,233,0.3);}
    .tag.red{background:rgba(239,68,68,0.15);color:#fca5a5;border:1px solid rgba(239,68,68,0.3);}
    .tag.green{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.3);}
    .tag.amber{background:rgba(245,158,11,0.15);color:#fcd34d;border:1px solid rgba(245,158,11,0.3);}
    /* Annotation */
    .note{background:rgba(14,165,233,0.08);border-left:3px solid #38bdf8;border-radius:0 8px 8px 0;padding:10px 12px;text-align:left;font-size:13px;color:#e2e8f0;line-height:1.6;max-width:340px;margin:0 auto 16px;}
    .note strong{color:#38bdf8;}
    /* Blink */
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
    .blink{animation:blink 1s ease-in-out infinite;}
    /* Pulse dot */
    .pulse-dot{width:10px;height:10px;border-radius:50%;background:#ef4444;display:inline-block;margin-right:6px;animation:pulse 1s ease-in-out infinite;}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.3);opacity:0.7;}}
    /* Split view label */
    .split-label{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:0.1em;color:#475569;margin-bottom:4px;}
    .split{display:flex;gap:10px;max-width:340px;margin:0 auto 16px;}
    .split>div{flex:1;}
    /* Divider */
    .divider{width:100%;max-width:340px;border:none;border-top:1px solid rgba(255,255,255,0.07);margin:16px auto;}
  </style>
</head>

let current = 0;

function render() {
  document.getElementById('app').innerHTML = STEPS[current].render();
  const pct = (current / (STEPS.length - 1)) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('stepLabel').textContent = `${current + 1} / ${STEPS.length}`;
  window.scrollTo(0,0);
}

function next() {
  if (current < STEPS.length - 1) {
    current++;
    render();
  }
}

function finish() {
  current = STEPS.length - 1;
  render();
}

function restart() {
  current = 0;
  render();
}

render();
