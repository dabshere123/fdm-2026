<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FDM 2026 — Worker App</title>
<style>*{box-sizing:border-box;margin:0;padding:0;}body{background:#0a0a14;color:#f1f5f9;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;}</style>
</head>
<body>
<div id="root"><div style="text-align:center;padding:40px"><div style="font-size:24px;font-weight:900;margin-bottom:8px">🎶 FDM 2026</div><div style="color:#64748b;font-size:14px">Loading Worker App...</div></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"
  onerror="document.getElementById('root').innerHTML='<div style=color:#ef4444;padding:20px>❌ React failed to load from CDN</div>'">
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"
  onerror="document.getElementById('root').innerHTML='<div style=color:#ef4444;padding:20px>❌ ReactDOM failed to load from CDN</div>'">
</script>
<script>
try {
  function App() {
    return React.createElement('div', {style:{textAlign:'center',padding:40}},
      React.createElement('div', {style:{fontSize:24,fontWeight:900,marginBottom:8}}, '🎶 FDM 2026'),
      React.createElement('div', {style:{color:'#64748b',fontSize:14,marginBottom:24}}, 'Worker App — React loaded OK'),
      React.createElement('div', {style:{color:'#22c55e',fontSize:16,fontWeight:700}}, '✅ If you see this, React is working')
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App, null));
} catch(e) {
  document.getElementById('root').innerHTML = '<div style="color:#ef4444;padding:20px;font-family:monospace"><b>JS Error:</b><br>' + e.message + '</div>';
}
</script>
</body>
</html>
