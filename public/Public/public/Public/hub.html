const AudioCtx = typeof window !== "undefined" ? window.AudioContext || window.webkitAudioContext : null;
let _actx = null;
const getCtx = () => {
  if (!_actx && AudioCtx) _actx = new AudioCtx();

const playTone = cfg => {
  try {
    const ctx = getCtx();
    if (!ctx) return;
    const {
      pattern = [[440, 0.3]],
      vol = 0.5,
      type = "sine",
      delay = 0
    } = cfg;
    let t = ctx.currentTime + delay;
    pattern.forEach(([freq, dur, gap = 0.05]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(vol, t + 0.02);
      gain.gain.setValueAtTime(vol, t + dur - 0.05);
      gain.gain.linearRampToValueAtTime(0, t + dur);
      osc.start(t);
      osc.stop(t + dur);
      t += dur + gap;
    });
  } catch (e) {}
};

    return new Promise(resolve => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.capture = 'environment';
      input.onchange = async e => {
        const file = e.target.files[0];
        if (!file) {
          resolve(null);
          return;
        }
        setLfPhotoCapturing(true);
        try {
          const base64 = await new Promise(res => {
            const r = new FileReader();
            r.onload = () => res(r.result.split(',')[1]);
            r.readAsDataURL(file);
          });
          setLfPhotoPreview('data:' + file.type + ';base64,' + base64);
          const resp = await fetch('/.netlify/functions/analyze-photo', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              imageData: base64,
              mediaType: file.type || 'image/jpeg',
              mode: 'lost_found'
            })
          });
          const data = await resp.json();
          if (data.description) setLfNewDesc(data.description);
          resolve(data.description || null);
        } catch (e) {
          console.log('Hub photo error:', e.message);
          resolve(null);
        } finally {
          setLfPhotoCapturing(false);
        }
      };
      input.click();
    });
