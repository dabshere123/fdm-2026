<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>FDM 2026 — L&F Tag</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#1a1a2e;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;}
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap');
  .tag{width:3.5in;min-height:2in;border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:10px;margin:16px auto;position:relative;break-inside:avoid;}
  .tag-day{font-size:11px;font-weight:900;letter-spacing:0.12em;text-transform:uppercase;opacity:0.85;}
  .tag-number{font-size:38px;font-weight:900;letter-spacing:0.04em;line-height:1;}
  .tag-location{font-size:14px;font-weight:700;opacity:0.9;}
  .tag-footer{font-size:10px;opacity:0.6;margin-top:4px;}
  .tag-divider{height:1px;background:rgba(255,255,255,0.25);margin:4px 0;}
  .screen-ui{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px;width:100%;max-width:480px;margin-bottom:20px;}
  label{font-size:12px;color:#94a3b8;font-weight:700;display:block;margin-bottom:4px;margin-top:12px;}
  select,input{width:100%;padding:10px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#f1f5f9;font-size:14px;font-family:inherit;}
  h1{color:#f1f5f9;font-size:18px;font-weight:900;margin-bottom:4px;}
  p{color:#64748b;font-size:12px;}
  .btn{display:block;width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;font-size:15px;font-weight:800;cursor:pointer;margin-top:16px;}
  .preview-label{color:#64748b;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;}
  @media print{body{background:#fff;padding:0;}:not(.tag){display:none!important;}.tag{display:flex!important;margin:0;box-shadow:none!important;}}
</style>
</head>
<body>
<div class="screen-ui" id="form">
  <h1>🏷 Print L&F Tag</h1>
  <p style="margin-top:4px">Fill in item details, preview the tag, then print.</p>

  <label>Day Found</label>
  <select id="day" onchange="update()">
    <option value="">-- Select Day --</option>
    <option value="THU">Thursday</option>
    <option value="FRI">Friday</option>
    <option value="SAT">Saturday</option>
    <option value="SUN">Sunday</option>
  </select>

  <label>Item Number</label>
  <input id="itemNum" placeholder="e.g. SAT-MOON-01" oninput="update()" style="text-transform:uppercase"/>

  <label>Where Found</label>
  <input id="location" placeholder="e.g. Near Moon Stage Left" oninput="update()"/>

  <label>Description (optional)</label>
  <input id="desc" placeholder="e.g. Black backpack, no ID" oninput="update()"/>

  <button class="btn" onclick="window.print()">🖨 Print Tag</button>
</div>

<div class="preview-label" id="previewLabel" style="display:none">TAG PREVIEW</div>
<div class="tag" id="tag" style="display:none"></div>

<script>
const DAY_COLORS={
  THU:{bg:"#7c2d12",border:"#ea580c",text:"#fff",accent:"#fed7aa",label:"THURSDAY"},
  FRI:{bg:"#1e3a8a",border:"#2563eb",text:"#fff",accent:"#bfdbfe",label:"FRIDAY"},
  SAT:{bg:"#14532d",border:"#16a34a",text:"#fff",accent:"#bbf7d0",label:"SATURDAY"},
  SUN:{bg:"#4a1d96",border:"#7c3aed",text:"#fff",accent:"#e9d5ff",label:"SUNDAY"},
};

function update(){
  const day=document.getElementById('day').value;
  const num=(document.getElementById('itemNum').value||'').toUpperCase();
  const loc=document.getElementById('location').value;
  const desc=document.getElementById('desc').value;
  const tag=document.getElementById('tag');
  const label=document.getElementById('previewLabel');
  if(!day||!num){tag.style.display='none';label.style.display='none';return;}
  const c=DAY_COLORS[day];
  tag.style.display='flex';
  label.style.display='block';
  tag.style.background=c.bg;
  tag.style.border=`3px solid ${c.border}`;
  tag.style.boxShadow=`0 0 24px ${c.border}66`;
  tag.style.color=c.text;
  tag.innerHTML=`
    <div class="tag-day" style="color:${c.accent}">🏷 FDM 2026 · LOST & FOUND · ${c.label}</div>
    <div class="tag-divider"></div>
    <div class="tag-number">${num}</div>
    <div class="tag-location">📍 ${loc||'Location not entered'}</div>
    ${desc?`<div style="font-size:12px;opacity:0.8;margin-top:2px">${desc}</div>`:''}
    <div class="tag-divider"></div>
    <div class="tag-footer">Fête de Marquette 2026 · McPike Park · Madison WI</div>
  `;
}
</script>
</body>
</html>
