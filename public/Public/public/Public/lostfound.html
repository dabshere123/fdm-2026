<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0"/>
  <title>FDM 2026 — Lost & Found</title>
  <meta name="theme-color" content="#0d0d0d"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{overflow-x:hidden;-webkit-overflow-scrolling:touch;font-size:16px;font-family:'DM Sans',sans-serif;}
    body{background:#0a0a14;color:#f1f5f9;min-height:100vh;padding-bottom:60px;}
    .hdr{padding:14px 16px;background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:12;}
    .back{padding:7px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#f1f5f9;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
    .title{font-size:17px;font-weight:900;color:#f1f5f9;}
    .body{padding:16px;max-width:520px;margin:0 auto;display:flex;flex-direction:column;gap:12;}
    .search{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:13px 16px;color:#f1f5f9;font-size:16px;font-family:inherit;outline:none;}
    .search::placeholder{color:#475569;}
    .filters{display:flex;gap:8px;flex-wrap:wrap;}
    .fbtn{padding:7px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#64748b;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
    .fbtn.active{border-color:rgba(139,92,246,0.6);background:rgba(139,92,246,0.12);color:#c4b5fd;}
    .card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:14px;overflow:hidden;margin-bottom:10px;}
    .card-photo{width:100%;max-height:200px;object-fit:cover;display:block;}
    .card-body{padding:14px;}
    .tag-num{font-size:12px;font-weight:900;color:#fb923c;letter-spacing:0.06em;margin-bottom:4px;}
    .item-desc{font-size:16px;font-weight:700;color:#f1f5f9;margin-bottom:6px;}
    .meta{font-size:12px;color:#64748b;margin-bottom:4px;}
    .at-office{font-size:14px;font-weight:900;color:#4ade80;margin:8px 0 4px;}
    .status-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:0.04em;}
    .status-found{background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.4);color:#fcd34d;}
    .status-office{background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);color:#4ade80;}
    .status-claimed{background:rgba(100,116,139,0.15);border:1px solid rgba(100,116,139,0.3);color:#94a3b8;text-decoration:line-through;}
    .pickup-btn{width:100%;margin-top:10px;padding:12px;border-radius:10px;border:1px solid rgba(139,92,246,0.4);background:rgba(139,92,246,0.08);color:#c4b5fd;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
    .office-btn{width:100%;margin-top:6px;padding:10px;border-radius:10px;border:1px solid rgba(34,197,94,0.4);background:rgba(34,197,94,0.06);color:#4ade80;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
    .empty{text-align:center;padding:48px 0;color:#374151;font-size:14px;}
    .loading{text-align:center;padding:48px 0;color:#475569;}
    .section-hdr{font-size:11px;font-weight:900;color:#374151;text-transform:uppercase;letter-spacing:0.08em;margin:8px 0 4px;}
    /* Admin modal */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:flex-end;z-index:100;}
    .modal{width:100%;background:#0d0d1a;border-radius:20px 20px 0 0;padding:24px 20px;display:flex;flex-direction:column;gap:14px;}
    .modal h2{font-size:18px;font-weight:900;color:#f1f5f9;}
    .inp{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:13px;color:#f1f5f9;font-size:16px;font-family:inherit;outline:none;}
    .btn-row{display:flex;gap:10px;}
    .btn-cancel{flex:1;padding:14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#94a3b8;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
    .btn-confirm{flex:2;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,rgba(139,92,246,0.9),rgba(109,40,217,0.9));color:#fff;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;}
  </style>
</head>
<body>
  <div class="hdr">
    <button class="back" onclick="history.back()">← Back</button>
    <div class="title">📦 Lost & Found</div>
  </div>

  <div class="body">
    <input class="search" id="searchInput" placeholder="Search by description or item #..." oninput="filterItems()"/>
    <div class="filters" id="dayFilters">
      <button class="fbtn active" onclick="setDay('')" id="all-btn">All Days</button>
      <button class="fbtn" onclick="setDay('Thu')" id="Thu-btn">Thursday</button>
      <button class="fbtn" onclick="setDay('Fri')" id="Fri-btn">Friday</button>
      <button class="fbtn" onclick="setDay('Sat')" id="Sat-btn">Saturday</button>
      <button class="fbtn" onclick="setDay('Sun')" id="Sun-btn">Sunday</button>
    </div>

    <!-- Admin: Add item + Mark at office -->
    <button style="padding:11px;border-radius:10px;border:1px solid rgba(245,158,11,0.3);background:rgba(245,158,11,0.06);color:#fcd34d;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;" onclick="openAdminModal()">
      ➕ Admin: Add Item / Mark AT FEST OFFICE
    </button>

    <div id="itemList"><div class="loading">Loading items...</div></div>
  </div>

  <!-- Admin PIN modal -->
  <div class="modal-bg" id="pinModal" style="display:none;">
    <div class="modal">
      <h2>Admin Access</h2>
      <div style="font-size:14px;color:#94a3b8;">Enter admin PIN to add items or mark AT FEST OFFICE</div>
      <input class="inp" id="pinInput" type="password" inputmode="numeric" placeholder="PIN" onkeydown="if(event.key==='Enter')checkPin()"/>
      <div class="btn-row">
        <button class="btn-cancel" onclick="closePinModal()">Cancel</button>
        <button class="btn-confirm" onclick="checkPin()">Enter</button>
      </div>
    </div>
  </div>

  <!-- Admin action modal -->
  <div class="modal-bg" id="adminModal" style="display:none;">
    <div class="modal">
      <h2>Admin — Add Item</h2>
      <div style="font-size:13px;color:#94a3b8;">Add a found item directly to the system</div>
      <div style="font-size:11px;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:0.08em;">Day Found</div>
      <div style="display:flex;gap:8px;">
        <button onclick="setAdminDay('Thu')" id="aday-Thu" style="flex:1;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#64748b;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">Thu</button>
        <button onclick="setAdminDay('Fri')" id="aday-Fri" style="flex:1;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#64748b;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">Fri</button>
        <button onclick="setAdminDay('Sat')" id="aday-Sat" style="flex:1;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#64748b;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">Sat</button>
        <button onclick="setAdminDay('Sun')" id="aday-Sun" style="flex:1;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#64748b;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">Sun</button>
      </div>
      <input class="inp" id="adminDesc" placeholder="Item description *"/>
      <input class="inp" id="adminLoc" placeholder="Where found *"/>
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
        <input type="checkbox" id="atOfficeCheck" style="width:20px;height:20px;cursor:pointer;"/>
        <span style="font-size:14px;font-weight:700;color:#4ade80;">Mark as AT FEST OFFICE</span>
      </label>
      <div class="btn-row">
        <button class="btn-cancel" onclick="closeAdminModal()">Cancel</button>
        <button class="btn-confirm" onclick="adminAddItem()">Add Item</button>
      </div>
    </div>
  </div>

  <!-- Pickup request modal -->
  <div class="modal-bg" id="pickupModal" style="display:none;">
    <div class="modal">
      <h2>Request Item Pickup</h2>
      <div style="font-size:14px;color:#94a3b8;" id="pickupItemLabel"></div>
      <input class="inp" id="pickupName" placeholder="Your name *"/>
      <input class="inp" id="pickupDesc" placeholder="Describe your item to confirm it's yours *"/>
      <div class="btn-row">
        <button class="btn-cancel" onclick="closePickup()">Cancel</button>
        <button class="btn-confirm" onclick="submitPickup()">Send Request</button>
      </div>
    </div>
  </div>

  <script>
    let allItems=[];
    let currentDay='';
    let currentPickupId='';
    let adminDay='';
    const ADMIN_PIN='8510';

    async function loadItems(){
      try{
        const r=await fetch('/.netlify/functions/get-lost-found');
        const d=await r.json();
        allItems=d.items||[];
        renderItems(allItems);
      }catch(e){
        document.getElementById('itemList').innerHTML='<div class="empty">Could not load items. Please refresh.</div>';
      }
    }

    function setDay(d){
      currentDay=d;
      document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
      document.getElementById((d||'all')+'-btn').classList.add('active');
      filterItems();
    }

    function filterItems(){
      const q=(document.getElementById('searchInput').value||'').toLowerCase().trim();
      let items=allItems;
      if(currentDay) items=items.filter(i=>(i.dayFound||'').toLowerCase().startsWith(currentDay.toLowerCase()));
      if(q) items=items.filter(i=>(i.description||'').toLowerCase().includes(q)||(i.itemNumber||'').toLowerCase().includes(q)||(i.foundAt||'').toLowerCase().includes(q));
      renderItems(items);
    }

    function renderItems(items){
      const el=document.getElementById('itemList');
      if(items.length===0){el.innerHTML='<div class="empty">No items found</div>';return;}
      const active=items.filter(i=>i.status!=='Claimed');
      const claimed=items.filter(i=>i.status==='Claimed');
      let html='';
      if(active.length>0){
        html+=`<div class="section-hdr">${active.length} item${active.length!==1?'s':''} in Lost & Found</div>`;
        active.forEach(i=>html+=renderCard(i));
      }
      if(claimed.length>0){
        html+=`<div class="section-hdr" style="margin-top:16px;">Claimed (${claimed.length})</div>`;
        claimed.forEach(i=>html+=renderCard(i));
      }
      el.innerHTML=html;
    }

    function renderCard(i){
      const atOffice=i.atFestOffice==='Yes'||i.atFestOffice===true;
      const claimed=i.status==='Claimed';
      let badge='';
      if(claimed) badge='<span class="status-badge status-claimed">Claimed</span>';
      else if(atOffice) badge='<span class="status-badge status-office">At Fest Office</span>';
      else badge='<span class="status-badge status-found">In L&F</span>';

      return `<div class="card">
        ${i.photoData?`<img class="card-photo" src="${i.photoData}" alt="Found item"/>`:''}
        <div class="card-body">
          <div class="tag-num">TAG #${i.itemNumber||'???'}</div>
          <div class="item-desc">${i.description||'Unknown item'}</div>
          ${atOffice?`<div class="at-office">📍 AT FEST OFFICE</div>`:''}
          <div class="meta">📍 Found at: ${i.foundAt||'Unknown'}</div>
          <div class="meta">📅 ${i.dayFound||''}</div>
          ${badge}
          ${!claimed?`<button class="pickup-btn" onclick="openPickup('${i.id}','${(i.itemNumber||'').replace(/'/g,"\\'")}','${(i.description||'').replace(/'/g,"\\'")}')">Request Pickup</button>`:''}
          ${atOffice&&!claimed?`<button class="office-btn" onclick="markOffice('${i.id}')">✅ Mark as Claimed</button>`:''}
        </div>
      </div>`;
    }

    // Pickup request
    function openPickup(id,num,desc){
      currentPickupId=id;
      document.getElementById('pickupItemLabel').textContent=`Item #${num}: ${desc}`;
      document.getElementById('pickupName').value='';
      document.getElementById('pickupDesc').value='';
      document.getElementById('pickupModal').style.display='flex';
    }
    function closePickup(){document.getElementById('pickupModal').style.display='none';}
    async function submitPickup(){
      const name=document.getElementById('pickupName').value.trim();
      const desc=document.getElementById('pickupDesc').value.trim();
      if(!name||!desc){alert('Please fill in both fields.');return;}
      try{
        await fetch('/.netlify/functions/lf-pickup-request',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({itemId:currentPickupId,claimantName:name,description:desc})});
        closePickup();
        alert('Request sent! Staff will verify and bring your item.');
      }catch(e){alert('Error sending request. Please try again.');}
    }

    // Admin flow
    function openAdminModal(){document.getElementById('pinModal').style.display='flex';setTimeout(()=>document.getElementById('pinInput').focus(),100);}
    function closePinModal(){document.getElementById('pinModal').style.display='none';document.getElementById('pinInput').value='';}
    function checkPin(){
      const p=document.getElementById('pinInput').value.trim();
      if(p===ADMIN_PIN){closePinModal();document.getElementById('adminModal').style.display='flex';}
      else{document.getElementById('pinInput').value='';document.getElementById('pinInput').placeholder='Wrong PIN';}
    }
    function closeAdminModal(){document.getElementById('adminModal').style.display='none';adminDay='';}
    function setAdminDay(d){
      adminDay=d;
      ['Thu','Fri','Sat','Sun'].forEach(x=>{
        const btn=document.getElementById('aday-'+x);
        btn.style.borderColor=x===d?'rgba(14,165,233,0.6)':'rgba(255,255,255,0.1)';
        btn.style.background=x===d?'rgba(14,165,233,0.12)':'rgba(255,255,255,0.04)';
        btn.style.color=x===d?'#38bdf8':'#64748b';
      });
    }
    async function adminAddItem(){
      const desc=document.getElementById('adminDesc').value.trim();
      const loc=document.getElementById('adminLoc').value.trim();
      const atOffice=document.getElementById('atOfficeCheck').checked;
      if(!desc||!loc){alert('Please fill in description and location.');return;}
      try{
        await fetch('/.netlify/functions/submit-lost-found',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({description:desc,foundAt:loc,dayFound:adminDay||'Unknown',foundBy:'Admin (Devin)',role:'Admin',atFestOffice:atOffice?'Yes':'No'})});
        closeAdminModal();
        document.getElementById('adminDesc').value='';
        document.getElementById('adminLoc').value='';
        document.getElementById('atOfficeCheck').checked=false;
        loadItems();
        alert('Item added successfully!');
      }catch(e){alert('Error adding item.');}
    }
    async function markOffice(id){
      try{
        await fetch('/.netlify/functions/update-lost-found',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,status:'Claimed'})});
        loadItems();
      }catch(e){}
    }

    loadItems();
  </script>
</body>
</html>
