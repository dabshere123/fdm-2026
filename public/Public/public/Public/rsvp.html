<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0"/>
<title>Fête de Marquette — Vendor Sign-Up</title>
<meta name="theme-color" content="#0a0a14"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a14;color:#f1f5f9;font-family:'DM Sans',sans-serif;min-height:100vh;padding:20px 16px 100px;}
.wrap{max-width:480px;margin:0 auto;}
.header{text-align:center;margin-bottom:26px;padding-top:8px;}
.logo{font-size:34px;margin-bottom:10px;}
.title{font-size:20px;font-weight:900;color:#f1f5f9;}
.subtitle{font-size:13px;color:#64748b;margin-top:4px;}
.field{margin-bottom:18px;}
.label{font-size:12px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;display:block;}
.label .req{color:#f59e0b;margin-left:2px;}
input,select{width:100%;padding:14px 16px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.12);border-radius:12px;color:#f1f5f9;font-size:16px;font-family:inherit;outline:none;}
input:focus,select:focus{border-color:#f59e0b;}
select{appearance:none;-webkit-appearance:none;background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%2394a3b8" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>');background-repeat:no-repeat;background-position:right 14px center;background-size:20px;}
option{background:#11182c;color:#f1f5f9;}

.confirm-wrap{position:fixed;bottom:0;left:0;right:0;padding:14px 16px 22px;background:linear-gradient(to top,#0a0a14 60%,rgba(10,10,20,0) 100%);}
.confirm-btn{width:100%;max-width:480px;display:block;margin:0 auto;padding:17px;border-radius:14px;border:none;background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a1000;font-size:17px;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 4px 24px rgba(245,158,11,0.3);opacity:0.4;}
.confirm-btn.ready{opacity:1;}
.hint{text-align:center;font-size:12px;color:#64748b;margin-top:10px;min-height:16px;}

.success{text-align:center;padding:60px 16px;}
.success .icon{font-size:56px;margin-bottom:16px;}
.success .msg{font-size:22px;font-weight:900;margin-bottom:8px;}
.success .sub{font-size:14px;color:#94a3b8;line-height:1.6;max-width:340px;margin:0 auto;}

.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:12px 14px;font-size:13px;color:#fca5a5;margin-bottom:16px;display:none;}
</style>
</head>
<body>
<div class="wrap">
  <div id="form-view">
    <div class="header">
      <div class="logo">🎶</div>
      <div class="title">Vendor Sign-Up</div>
      <div class="subtitle">Fête de Marquette 2026 · July 9–12 · McPike Park</div>
    </div>

    <div class="error" id="error-box"></div>

    <div class="field">
      <label class="label">Vendor / Business Name<span class="req">*</span></label>
      <input id="business-name" type="text" placeholder="e.g. Joe's Tacos" oninput="updateBtn()"/>
    </div>

    <div class="field">
      <label class="label">Festival Contact Person<span class="req">*</span></label>
      <input id="contact-name" type="text" placeholder="Who we should call/text" oninput="updateBtn()"/>
    </div>

    <div class="field">
      <label class="label">Phone Number<span class="req">*</span></label>
      <input id="phone" type="tel" placeholder="608-555-1234" autocomplete="tel" oninput="updateBtn()"/>
    </div>

    <div class="field">
      <label class="label">Your Location<span class="req">*</span></label>
      <select id="location" onchange="updateBtn()">
        <option value="">Select your location...</option>
        <option value="Brearly">Brearly</option>
        <option value="Moon Stage">Moon Stage</option>
        <option value="Family Fete">Family Fete</option>
        <option value="Sun Stage">Sun Stage</option>
      </select>
    </div>

    <div style="height:70px"></div>
  </div>

  <div id="success-view" class="success" style="display:none">
    <div class="icon">✅</div>
    <div class="msg">You're all set!</div>
    <div class="sub">You'll receive festival broadcasts and emergency alerts — by text and phone call — at this number throughout the weekend. A confirmation text is on its way.</div>
  </div>
</div>

<div class="confirm-wrap" id="confirm-wrap">
  <button class="confirm-btn" id="confirm-btn" onclick="submitForm()">Sign Up →</button>
  <div class="hint" id="hint"></div>
</div>

<script>
function updateBtn(){
  const businessName=document.getElementById('business-name').value.trim();
  const contactName=document.getElementById('contact-name').value.trim();
  const phone=document.getElementById('phone').value.trim();
  const location=document.getElementById('location').value;
  const ready=businessName&&contactName&&phone&&location;
  const btn=document.getElementById('confirm-btn');
  btn.className='confirm-btn'+(ready?' ready':'');
  const hint=document.getElementById('hint');
  if(ready){hint.textContent='';}
  else{
    const missing=[];
    if(!businessName)missing.push('business name');
    if(!contactName)missing.push('contact person');
    if(!phone)missing.push('phone number');
    if(!location)missing.push('location');
    hint.textContent='Still needed: '+missing.join(', ');
  }
}

async function submitForm(){
  const businessName=document.getElementById('business-name').value.trim();
  const contactName=document.getElementById('contact-name').value.trim();
  const phone=document.getElementById('phone').value.trim();
  const location=document.getElementById('location').value;
  if(!businessName||!contactName||!phone||!location) return;

  const btn=document.getElementById('confirm-btn');
  const errorBox=document.getElementById('error-box');
  errorBox.style.display='none';
  btn.textContent='Signing up...';btn.disabled=true;

  try{
    const res=await fetch('/.netlify/functions/submit-vendor',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({businessName,contactName,phone,location})
    });
    const data=await res.json();
    if(!res.ok||data.error){
      throw new Error(data.error||'Something went wrong. Please try again.');
    }
    document.getElementById('form-view').style.display='none';
    document.getElementById('confirm-wrap').style.display='none';
    document.getElementById('success-view').style.display='block';
    window.scrollTo(0,0);
  }catch(e){
    btn.textContent='Sign Up →';btn.disabled=false;
    errorBox.textContent='⚠️ '+e.message;
    errorBox.style.display='block';
    window.scrollTo(0,0);
  }
}

// ═══ FDM 2026 IS OVER — set to false when reactivating for the 2027 festival ═══
const DORMANT = true;
if (DORMANT) {
  document.body.innerHTML = `
    <div style="min-height:100vh;background:#0a0a14;color:#f1f5f9;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;font-family:'DM Sans',sans-serif;">
      <div style="font-size:56px;margin-bottom:16px;">🎪</div>
      <div style="font-size:24px;font-weight:900;margin-bottom:10px;">Fête de Marquette 2026 Has Wrapped!</div>
      <div style="font-size:15px;color:#94a3b8;max-width:400px;line-height:1.6;">Thanks for an incredible festival. Vendor sign-up is now closed for the season — see you in 2027!</div>
    </div>`;
} else {
  updateBtn();
}
</script>
</body>
</html>
