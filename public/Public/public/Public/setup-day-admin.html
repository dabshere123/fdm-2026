<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1"/>
<title>FDM 2026 — Setup Day Admin</title>
<style>
  :root{
    --bg:#0a0f1e; --card:#11182c; --border:rgba(255,255,255,0.08);
    --amber:#f59e0b; --amber-dim:rgba(245,158,11,0.15);
    --text:#f1f5f9; --sub:#94a3b8; --faint:#475569;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; min-height:100vh;}
  .wrap{max-width:560px; margin:0 auto; padding:0 0 60px;}
  .back-btn{display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,0.08); border:none; color:var(--text); font-size:13px; font-weight:700; padding:9px 14px; border-radius:10px; cursor:pointer; margin:16px 16px 0;}
  .hdr{padding:16px 20px 20px; text-align:center;}
  .hdr .eyebrow{font-size:11px; font-weight:800; letter-spacing:0.14em; text-transform:uppercase; color:var(--amber); margin-bottom:6px;}
  .hdr h1{margin:0; font-size:24px; font-weight:900; letter-spacing:-0.01em;}
  .hdr .sub{margin-top:6px; font-size:13px; color:var(--sub);}
  .content{padding:8px 16px 16px;}

  .section-title{font-size:13px; font-weight:800; color:var(--amber); text-transform:uppercase; letter-spacing:0.06em; margin:22px 0 10px;}
  .card{background:var(--card); border:1.5px solid var(--border); border-radius:14px; padding:16px 18px; margin-bottom:12px;}

  .btn{padding:13px; border-radius:11px; border:none; background:linear-gradient(135deg,#f59e0b,#d97706); color:#1a1000; font-weight:800; font-size:14px; cursor:pointer; width:100%; font-family:inherit;}
  .btn.secondary{background:linear-gradient(135deg,#475569,#334155); color:#f1f5f9;}
  .btn.small{width:auto; padding:8px 14px; font-size:12px;}
  .btn.danger{background:rgba(239,68,68,0.15); color:#fca5a5;}

  input, select, textarea{width:100%; padding:11px 14px; background:rgba(255,255,255,0.06); border:1.5px solid var(--border); border-radius:10px; color:var(--text); font-size:14px; font-family:inherit; outline:none; margin-bottom:8px;}
  input:focus, select:focus, textarea:focus{border-color:var(--amber);}
  option{background:#11182c;}

  .checklist-row{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid rgba(255,255,255,0.05);}
  .checklist-row:last-child{border-bottom:none;}
  .checklist-status{width:9px; height:9px; border-radius:50%; flex-shrink:0;}
  .checklist-status.done{background:#6ee7b7;}
  .checklist-status.progress{background:#fbbf24;}
  .checklist-status.pending{background:#475569;}
  .checklist-text{flex:1; font-size:13px; color:var(--text);}
  .checklist-sub{font-size:11px; color:var(--faint);}
  .checklist-detail{font-size:11.5px; color:var(--sub); margin-top:4px; line-height:1.5;}

  .group-card-name{font-size:16px; font-weight:800; color:var(--text); margin-bottom:10px;}
  .status-pill{display:inline-block; font-size:10px; font-weight:800; text-transform:uppercase; padding:2px 8px; border-radius:6px; margin-left:8px;}
  .status-pill.assigned{background:rgba(99,102,241,0.15); color:#a5b4fc;}
  .status-pill.idle{background:rgba(100,116,139,0.15); color:#94a3b8;}

  .task-row{display:flex; align-items:center; gap:10px; padding:9px 12px; background:rgba(255,255,255,0.04); border-radius:9px; margin-bottom:6px;}
  .task-row.complete{opacity:0.5;}
  .task-row-text{flex:1; font-size:13px;}
  .task-row-done{font-size:11px; color:#6ee7b7; font-weight:800;}
  .task-notes-display{font-size:12px; color:var(--amber); background:rgba(245,158,11,0.08); border-left:2px solid var(--amber); padding:5px 8px; border-radius:5px; margin-top:6px;}

  .overview-group{margin-bottom:16px;}
  .overview-group:last-child{margin-bottom:0;}
  .overview-group-name{font-size:14px; font-weight:900; color:var(--text); margin-bottom:6px; display:flex; align-items:center; gap:8px;}
  .overview-task{font-size:13px; color:var(--sub); padding:6px 0 6px 14px; border-left:2px solid rgba(245,158,11,0.3); margin-bottom:4px;}
  .overview-task .name{color:var(--text); font-weight:700;}
  .overview-empty{font-size:13px; color:var(--faint); text-align:center; padding:8px 0;}
  .phone-row{display:flex; gap:8px;}
  .phone-row input{margin-bottom:0;}
</style>
</head>
<body>
<div class="wrap">
  <button class="back-btn" onclick="window.location.href='/setup-day';">← Back to Setup Day</button>
  <div class="hdr">
    <div class="eyebrow">Fête de Marquette 2026</div>
    <h1>Setup Day — Admin</h1>
    <div class="sub">All tasks and groups in one place</div>
  </div>

  <div class="content">

    <div id="errorBanner" style="display:none;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.35);border-radius:10px;padding:12px 14px;font-size:12.5px;color:#fca5a5;margin-bottom:16px;line-height:1.5;"></div>

    <div class="section-title">Whole Day</div>
    <div class="card" id="allCompleteControls"></div>

    <div class="section-title">Live Overview — Who's Doing What</div>
    <div class="card" id="liveOverview"></div>

    <div class="section-title">All Tasks — What's Left vs. Done</div>
    <div class="card" id="masterChecklist"></div>

    <div class="section-title">Groups</div>
    <div id="adminGroupList"></div>

  </div>
</div>

<script>
const GROUPS = [
  "G1 — Operation Fresh Start (8, Truck 1)",
  "G2 — Wardell + 2 FIPs (Uhaul)",
  "G3 — Steve, Oscar, 1 FIP",
  "G4 — 4 FIPs",
  "Electrical — Rob, Bruce J",
  "Trash Cans — Mousa",
];
const TASK_OPTIONS = [
  "Left & Right Bank Bars", "Cabaret Bar", "Family Fete Bar", "Moon Stage Bar", "Lafayette Stage Bar",
  "Cabaret Tent", "Family Fete Tent", "Lafayette Shade Tents", "Moon Stage Patio + Tent",
  "Sun Stage Shade Tents (4)", "Sun Stage General Seating", "Lagniappe Stage Seating",
  "Everything Else Cafe", "Prize Wheel", "Hospitality / Grounds",
  "Electrical — Hang Lights", "Trash Cans — Set Out Cans", "Bike Racks"
];

const TASK_DETAILS = {
  "Left & Right Bank Bars": "10 Bar Sections, 8 6' Tables, 2 4' Tables — 4 bar sections, 4 6' tables, 1 4' table on EACH side (Left and Right).",
  "Cabaret Bar": "4 Bar Sections, 1 6' Table.",
  "Family Fete Bar": "4 Bar Sections, 3 8' Tables, 1 6' Table.",
  "Moon Stage Bar": "8 Bar Sections, 2 8' Tables, 1 6' Table, 1 4' Table. Follow the Moon Stage Bar Set diagram — U-shape with 6' table centered, 2 caddies at the open end.",
  "Lafayette Stage Bar": "4 Bar Sections, 3 8' Tables, 1 6' Table, 4 Cabaret Tables.",
  "Cabaret Tent": "20 Round Tables, 100 Chairs. Set 4 rows (centered to stage) of 4 tables each. 5 chairs per table.",
  "Family Fete Tent": "6 Round Tables, 50 Chairs. Set 2 rows (centered to stage) of 3 tables each. 5 chairs per table.",
  "Lafayette Shade Tents": "40 Round Tables, 200 Chairs. 8 round in each 20x40 tent, 4 in the 20x20 tent (20 tables/100 chairs). Plus 20 more round tables & 100 chairs for general seating, spread 15 ft from stage.",
  "Moon Stage Patio + Tent": "10 Round Tables, 100 Chairs, 20 Cabaret Tables. Set up against the building on the grassy area.",
  "Sun Stage Shade Tents (4)": "32 Round Tables, 160 Chairs. Set 4 rows (along the 40' side) of 5 tables each. Equalize space between tables.",
  "Sun Stage General Seating": "16-18 Round Tables, 400+ Chairs. Set chairs in an arc beginning at the concrete end. Tables behind the chairs, also in an arc. Gary will distribute many leftover chairs.",
  "Lagniappe Stage Seating": "20 Round Tables, 8 Cabaret Tables, 100 Chairs. Set up against the building.",
  "Everything Else Cafe": "4 8' Tables, 6 Cabaret Tables. 8' tables on the sides create 2 bars. 6 cabaret tables along the back, between the table bars.",
  "Prize Wheel": "6 6' Tables, 1 4' Table. Grab needed chairs from the pile.",
  "Hospitality / Grounds": "4 8' + 2 4' Tables → Moon. 4 8' + 2 4' Tables → Sun Stage. 2 8' Tables → Cabaret. 4 8' Tables → Grounds. Grab needed chairs from the 345 pile.",
  "Electrical — Hang Lights": "Hang string lights per the site map.",
  "Trash Cans — Set Out Cans": "Set out garbage cans at each location per the site map.",
  "Bike Racks": "Set out bike racks per the site map.",
};

async function fetchAll(){
  try{
    const res = await fetch('/.netlify/functions/setup-task-status');
    const data = await res.json();
    return { assignments: data.assignments || [], phones: data.phones || [], error: data.error || null };
  }catch(e){ return { assignments: [], phones: [], error: e.message }; }
}

async function renderAll(){
  const { assignments, phones, error } = await fetchAll();
  const phonesByGroup = Object.fromEntries(phones.map(p => [p.groupName, p.phone]));

  const errEl = document.getElementById('errorBanner');
  if(error){
    errEl.style.display = 'block';
    errEl.textContent = '⚠️ ' + error;
  } else {
    errEl.style.display = 'none';
  }

  // Whole-day controls
  const dayComplete = assignments.some(a => a.groupName === 'ALL' && a.task === 'DAY_COMPLETE' && a.status === 'DONE');
  const acEl = document.getElementById('allCompleteControls');
  if(dayComplete){
    acEl.innerHTML = `
      <div style="font-size:13px;color:#6ee7b7;font-weight:800;margin-bottom:10px;">🎉 Marked complete — every group's app shows "head back," and anyone with a phone on file was texted.</div>
      <button class="btn secondary" onclick="clearAllComplete()">↩ Undo — Day Is NOT Actually Done</button>
    `;
  } else {
    acEl.innerHTML = `
      <div style="font-size:12.5px;color:var(--sub);margin-bottom:10px;">Once everything below is done, tap this to tell every group they can head back — and text anyone with a phone on file.</div>
      <button class="btn" onclick="markAllComplete()">📢 Mark Whole Day Complete</button>
    `;
  }

  // Live overview — grouped by group, active + recently completed tasks only
  const overviewEl = document.getElementById('liveOverview');
  const groupsWithWork = GROUPS.filter(g => assignments.some(a => a.groupName === g));
  if(groupsWithWork.length === 0){
    overviewEl.innerHTML = '<div class="overview-empty">No tasks assigned to anyone yet.</div>';
  } else {
    overviewEl.innerHTML = groupsWithWork.map(g => {
      const mine = assignments.filter(a => a.groupName === g);
      const active = mine.filter(a => a.status !== 'DONE');
      const done = mine.filter(a => a.status === 'DONE');
      const rows = [...active, ...done].map(a => `
        <div class="overview-task">
          <span class="name">${a.task}</span>${a.status === 'DONE' ? ' — ✓ Done' : ''}
          ${a.notes ? `<div style="color:var(--amber);font-size:12px;margin-top:2px;">📌 ${a.notes}</div>` : ''}
          ${a.status !== 'DONE' ? `<div style="display:flex;gap:6px;margin-top:6px;">
            <textarea placeholder="Add to this task, texts the group..." id="addon-${a.id}" style="flex:1;font-size:12px;padding:7px 10px;margin-bottom:0;min-height:44px;resize:vertical;"></textarea>
            <button class="btn small" style="flex-shrink:0;" onclick="addToTask('${a.id}')">📲 Send</button>
          </div>` : ''}
        </div>
      `).join('');
      return `
        <div class="overview-group">
          <div class="overview-group-name">${g} <span class="status-pill ${active.length ? 'assigned' : 'idle'}">${active.length} active${done.length ? ', ' + done.length + ' done' : ''}</span></div>
          ${rows}
        </div>
      `;
    }).join('');
  }

  // Master checklist — predefined tasks, plus any custom ones that have actually been assigned
  const checklistEl = document.getElementById('masterChecklist');
  const customTaskNames = [...new Set(assignments.map(a => a.task))].filter(t => t && !TASK_OPTIONS.includes(t) && t !== 'DAY_COMPLETE');
  const allChecklistTasks = [...TASK_OPTIONS, ...customTaskNames];
  checklistEl.innerHTML = allChecklistTasks.map(taskName => {
    const matches = assignments.filter(a => a.task === taskName);
    const isDone = matches.some(a => a.status === 'DONE');
    const isActive = !isDone && matches.some(a => a.status !== 'DONE');
    const statusClass = isDone ? 'done' : isActive ? 'progress' : 'pending';
    const groupsOnIt = [...new Set(matches.map(a => a.groupName))].join(', ');
    const isCustom = customTaskNames.includes(taskName);
    return `
      <div class="checklist-row" style="align-items:flex-start;">
        <div class="checklist-status ${statusClass}" style="margin-top:5px;"></div>
        <div class="checklist-text">
          ${taskName}${isCustom ? ' <span style="font-size:10px;color:var(--faint);">(custom)</span>' : ''}${groupsOnIt ? `<div class="checklist-sub">${isDone ? 'Done by' : 'Assigned to'}: ${groupsOnIt}</div>` : ''}
          <div class="checklist-detail">${TASK_DETAILS[taskName] || ''}</div>
        </div>
      </div>
    `;
  }).join('');

  // Group cards
  const listEl = document.getElementById('adminGroupList');
  listEl.innerHTML = GROUPS.map(g => {
    const mine = assignments.filter(a => a.groupName === g);
    const active = mine.filter(a => a.status !== 'DONE');
    const done = mine.filter(a => a.status === 'DONE');
    const currentPhone = phonesByGroup[g] || '';

    const taskRows = [...active, ...done].map(a => `
      <div class="task-row ${a.status === 'DONE' ? 'complete' : ''}" style="align-items:flex-start;">
        <div style="flex:1;">
          <div class="task-row-text">${a.task}</div>
          <div class="checklist-detail" style="margin-top:3px;">${TASK_DETAILS[a.task] || ''}</div>
          ${a.notes ? `<div class="task-notes-display">📌 ${a.notes}</div>` : ''}
          ${a.status !== 'DONE' ? `<div style="display:flex;gap:6px;margin-top:6px;">
            <textarea placeholder="Add/edit note for this task..." id="note-${a.id}" style="flex:1;font-size:12px;padding:7px 10px;margin-bottom:0;min-height:44px;resize:vertical;">${a.notes || ''}</textarea>
            <button class="btn small" style="flex-shrink:0;" onclick="saveNotes('${a.id}')">Save</button>
          </div>` : ''}
        </div>
        ${a.status === 'DONE'
          ? '<div class="task-row-done">✓ Done</div>'
          : `<button class="btn danger small" onclick="removeTask('${a.id}')">Remove</button>`}
      </div>
    `).join('') || '<div style="font-size:12px;color:var(--faint);margin-bottom:8px;">No tasks assigned yet.</div>';

    const options = TASK_OPTIONS.map(t => `<option value="${t}">${t}</option>`).join('');
    return `
      <div class="card">
        <div class="group-card-name">${g} <span class="status-pill ${active.length ? 'assigned' : 'idle'}">${active.length} active</span></div>
        <div class="phone-row">
          <input type="tel" placeholder="Phone number (optional)" id="phone-${g.replace(/\s+/g,'')}" value="${currentPhone}"/>
          <button class="btn small" style="flex-shrink:0;" onclick="savePhone('${g}')">Save</button>
        </div>
        <div style="margin:12px 0 10px;">${taskRows}</div>
        <select id="assign-${g.replace(/\s+/g,'')}" onchange="toggleCustomTask('${g}')">
          <option value="">— Choose a task to add —</option>
          ${options}
          <option value="__custom__">✏️ Custom Task (type your own)</option>
        </select>
        <textarea placeholder="Type the custom task name..." id="customtask-${g.replace(/\s+/g,'')}" style="display:none;min-height:44px;resize:vertical;"></textarea>
        <textarea placeholder="Extra note for this assignment (optional)" id="assignnote-${g.replace(/\s+/g,'')}" style="min-height:44px;resize:vertical;"></textarea>
        <button class="btn" onclick="assignTask('${g}')">+ Add This Task</button>
      </div>
    `;
  }).join('');
}

async function savePhone(groupName){
  const input = document.getElementById('phone-' + groupName.replace(/\s+/g,''));
  const phone = input.value.trim();
  try{
    await fetch('/.netlify/functions/setup-task-status', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action: 'setPhone', groupName, phone })
    });
  }catch(e){}
  input.style.borderColor = '#6ee7b7';
  setTimeout(() => { input.style.borderColor = ''; }, 1200);
}

function toggleCustomTask(groupName){
  const key = groupName.replace(/\s+/g,'');
  const sel = document.getElementById('assign-' + key);
  const customInput = document.getElementById('customtask-' + key);
  customInput.style.display = sel.value === '__custom__' ? 'block' : 'none';
  if(sel.value === '__custom__') customInput.focus();
}

async function assignTask(groupName){
  const key = groupName.replace(/\s+/g,'');
  const sel = document.getElementById('assign-' + key);
  const customInput = document.getElementById('customtask-' + key);
  const noteInput = document.getElementById('assignnote-' + key);
  const task = sel.value === '__custom__' ? customInput.value.trim() : sel.value;
  const notes = noteInput ? noteInput.value.trim() : '';
  if(!task){ alert(sel.value === '__custom__' ? 'Type the custom task name first.' : 'Pick a task first.'); return; }
  try{
    const res = await fetch('/.netlify/functions/setup-task-status', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action: 'assign', groupName, task, notes })
    });
    const data = await res.json();
    if(!data.success){
      alert('⚠️ Could not save this assignment:\n\n' + (data.error || 'Unknown error'));
    }
  }catch(e){
    alert('⚠️ Network error: ' + e.message);
  }
  renderAll();
}

async function addToTask(id){
  const input = document.getElementById('addon-' + id);
  const addon = input.value.trim();
  if(!addon){ alert('Type something to add first.'); return; }
  try{
    const res = await fetch('/.netlify/functions/setup-task-status', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action: 'addToTask', id, notes: addon })
    });
    const data = await res.json();
    if(!data.success){
      alert('⚠️ Could not send this update:\n\n' + (data.error || 'Unknown error'));
      return;
    }
    if(!data.texted){
      alert('Saved — but this group has no phone number on file yet, so no text went out. It\'ll show in the app next time they check.');
    }
  }catch(e){
    alert('⚠️ Network error: ' + e.message);
    return;
  }
  renderAll();
}

async function saveNotes(id){
  const input = document.getElementById('note-' + id);
  const notes = input.value.trim();
  try{
    const res = await fetch('/.netlify/functions/setup-task-status', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action: 'updateNotes', id, notes })
    });
    const data = await res.json();
    if(!data.success){
      alert('⚠️ Could not save note:\n\n' + (data.error || 'Unknown error'));
      return;
    }
  }catch(e){
    alert('⚠️ Network error: ' + e.message);
    return;
  }
  renderAll();
}

async function removeTask(id){
  try{
    await fetch('/.netlify/functions/setup-task-status', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action: 'remove', id })
    });
  }catch(e){}
  renderAll();
}

async function markAllComplete(){
  if(!confirm('Tell every group they can head back? This shows a "Setup Complete" banner on everyone\'s phone and texts anyone with a number on file.')) return;
  try{
    await fetch('/.netlify/functions/setup-task-status', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action: 'markAllComplete' })
    });
  }catch(e){}
  renderAll();
}

async function clearAllComplete(){
  try{
    await fetch('/.netlify/functions/setup-task-status', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action: 'clearAllComplete' })
    });
  }catch(e){}
  renderAll();
}

renderAll();
setInterval(renderAll, 15000);
</script>
</body>
</html>
