<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1"/>
<title>FDM 2026 — Setup Day Admin</title>
<style>
  :root{
    --bg:#0a0f1e; --card:#11182c; --border:rgba(255,255,255,0.08);
    --amber:#f59e0b; --amber-dim:rgba(245,158,11,0.15);
    --text:#f1f5f9; --sub:#94a3b8; --faint:#475569;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; min-height:100vh;}
  .wrap{max-width:560px; margin:0 auto; padding:0 0 60px;}
  .back-btn{display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,0.08); border:none; color:var(--text); font-size:13px; font-weight:700; padding:9px 14px; border-radius:10px; cursor:pointer; margin:16px 16px 0;}
  .hdr{padding:16px 20px 20px; text-align:center;}
  .hdr .eyebrow{font-size:11px; font-weight:800; letter-spacing:0.14em; text-transform:uppercase; color:var(--amber); margin-bottom:6px;}
  .hdr h1{margin:0; font-size:24px; font-weight:900; letter-spacing:-0.01em;}
  .hdr .sub{margin-top:6px; font-size:13px; color:var(--sub);}
  .content{padding:8px 16px 16px;}

  .section-title{font-size:13px; font-weight:800; color:var(--amber); text-transform:uppercase; letter-spacing:0.06em; margin:22px 0 10px;}
  .card{background:var(--card); border:1.5px solid var(--border); border-radius:14px; padding:16px 18px; margin-bottom:12px;}

  .btn{padding:13px; border-radius:11px; border:none; background:linear-gradient(135deg,#f59e0b,#d97706); color:#1a1000; font-weight:800; font-size:14px; cursor:pointer; width:100%; font-family:inherit;}
  .btn.secondary{background:linear-gradient(135deg,#475569,#334155); color:#f1f5f9;}
  .btn.small{width:auto; padding:8px 14px; font-size:12px;}
  .btn.danger{background:rgba(239,68,68,0.15); color:#fca5a5;}

  input, select{width:100%; padding:11px 14px; background:rgba(255,255,255,0.06); border:1.5px solid var(--border); border-radius:10px; color:var(--text); font-size:14px; font-family:inherit; outline:none; margin-bottom:8px;}
  input:focus, select:focus{border-color:var(--amber);}
  option{background:#11182c;}

  .checklist-row{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid rgba(255,255,255,0.05);}
  .checklist-row:last-child{border-bottom:none;}
  .checklist-status{width:9px; height:9px; border-radius:50%; flex-shrink:0;}
  .checklist-status.done{background:#6ee7b7;}
  .checklist-status.progress{background:#fbbf24;}
  .checklist-status.pending{background:#475569;}
  .checklist-text{flex:1; font-size:13px; color:var(--text);}
  .checklist-sub{font-size:11px; color:var(--faint);}

  .group-card-name{font-size:16px; font-weight:800; color:var(--text); margin-bottom:10px;}
  .status-pill{display:inline-block; font-size:10px; font-weight:800; text-transform:uppercase; padding:2px 8px; border-radius:6px; margin-left:8px;}
  .status-pill.assigned{background:rgba(99,102,241,0.15); color:#a5b4fc;}
  .status-pill.idle{background:rgba(100,116,139,0.15); color:#94a3b8;}

  .task-row{display:flex; align-items:center; gap:10px; padding:9px 12px; background:rgba(255,255,255,0.04); border-radius:9px; margin-bottom:6px;}
  .task-row.complete{opacity:0.5;}
  .task-row-text{flex:1; font-size:13px;}
  .task-row-done{font-size:11px; color:#6ee7b7; font-weight:800;}
  .phone-row{display:flex; gap:8px;}
  .phone-row input{margin-bottom:0;}
</style>
</head>
<body>
<div class="wrap">
  <button class="back-btn" onclick="window.location.href='/hub';">← Back to Hub</button>
  <div class="hdr">
    <div class="eyebrow">Fête de Marquette 2026</div>
    <h1>Setup Day — Admin</h1>
    <div class="sub">All tasks and groups in one place</div>
  </div>

  <div class="content">

    <div class="section-title">Whole Day</div>
    <div class="card" id="allCompleteControls"></div>

    <div class="section-title">All Tasks — What's Left vs. Done</div>
    <div class="card" id="masterChecklist"></div>

    <div class="section-title">Groups</div>
    <div id="adminGroupList"></div>

  </div>
</div>

<script>
const GROUPS = ["G1", "G2", "G3", "G4", "Electrical", "Garbage Cans", "Truck 1", "Truck 2"];
const TASK_OPTIONS = [
  "Left & Right Bank Bars", "Cabaret Bar", "Family Fete Bar", "Moon Stage Bar", "Lafayette Stage Bar",
  "Cabaret Tent", "Family Fete Tent", "Lafayette Shade Tents", "Moon Stage Patio + Tent",
  "Sun Stage Shade Tents (4)", "Sun Stage General Seating", "Lagniappe Stage Seating",
  "Everything Else Cafe", "Prize Wheel", "Hospitality / Grounds",
  "Electrical — Hang Lights", "Garbage Cans — Set Out Cans"
];

async function fetchAll(){
  try{
    const res = await fetch('/.netlify/functions/setup-task-status');
    const data = await res.json();
    return { assignments: data.assignments || [], phones: data.phones || [] };
  }catch(e){ return { assignments: [], phones: [] }; }
}

async function renderAll(){
  const { assignments, phones } = await fetchAll();
  const phonesByGroup = Object.fromEntries(phones.map(p => [p.groupName, p.phone]));

  // Whole-day controls
  const dayComplete = assignments.some(a => a.groupName === 'ALL' && a.task === 'DAY_COMPLETE' && a.status === 'complete');
  const acEl = document.getElementById('allCompleteControls');
  if(dayComplete){
    acEl.innerHTML = `
      <div style="font-size:13px;color:#6ee7b7;font-weight:800;margin-bottom:10px;">🎉 Marked complete — every group's app shows "head back," and anyone with a phone on file was texted.</div>
      <button class="btn secondary" onclick="clearAllComplete()">↩ Undo — Day Is NOT Actually Done</button>
    `;
  } else {
    acEl.innerHTML = `
      <div style="font-size:12.5px;color:var(--sub);margin-bottom:10px;">Once everything below is done, tap this to tell every group they can head back — and text anyone with a phone on file.</div>
      <button class="btn" onclick="markAllComplete()">📢 Mark Whole Day Complete</button>
    `;
  }

  // Master checklist
  const checklistEl = document.getElementById('masterChecklist');
  checklistEl.innerHTML = TASK_OPTIONS.map(taskName => {
    const matches = assignments.filter(a => a.task === taskName);
    const isDone = matches.some(a => a.status === 'complete');
    const isActive = !isDone && matches.some(a => a.status !== 'complete');
    const statusClass = isDone ? 'done' : isActive ? 'progress' : 'pending';
    const groupsOnIt = [...new Set(matches.map(a => a.groupName))].join(', ');
    return `
      <div class="checklist-row">
        <div class="checklist-status ${statusClass}"></div>
        <div class="checklist-text">${taskName}${groupsOnIt ? `<div class="checklist-sub">${isDone ? 'Done by' : 'Assigned to'}: ${groupsOnIt}</div>` : ''}</div>
      </div>
    `;
  }).join('');

  // Group cards
  const listEl = document.getElementById('adminGroupList');
  listEl.innerHTML = GROUPS.map(g => {
    const mine = assignments.filter(a => a.groupName === g);
    const active = mine.filter(a => a.status !== 'complete');
    const done = mine.filter(a => a.status === 'complete');
    const currentPhone = phonesByGroup[g] || '';

    const taskRows = [...active, ...done].map(a => `
      <div class="task-row ${a.status === 'complete' ? 'complete' : ''}">
        <div class="task-row-text">${a.task}</div>
        ${a.status === 'complete'
          ? '<div class="task-row-done">✓ Done</div>'
          : `<button class="btn danger small" onclick="removeTask('${a.id}')">Remove</button>`}
      </div>
    `).join('') || '<div style="font-size:12px;color:var(--faint);margin-bottom:8px;">No tasks assigned yet.</div>';

    const options = TASK_OPTIONS.map(t => `<option value="${t}">${t}</option>`).join('');
    return `
      <div class="card">
        <div class="group-card-name">${g} <span class="status-pill ${active.length ? 'assigned' : 'idle'}">${active.length} active</span></div>
        <div class="phone-row">
          <input type="tel" placeholder="Phone number (optional)" id="phone-${g.replace(/\s+/g,'')}" value="${currentPhone}"/>
          <button class="btn small" style="flex-shrink:0;" onclick="savePhone('${g}')">Save</button>
        </div>
        <div style="margin:12px 0 10px;">${taskRows}</div>
        <select id="assign-${g.replace(/\s+/g,'')}">
          <option value="">— Choose a task to add —</option>
          ${options}
        </select>
        <button class="btn" onclick="assignTask('${g}')">+ Add This Task</button>
      </div>
    `;
  }).join('');
}

async function savePhone(groupName){
  const input = document.getElementById('phone-' + groupName.replace(/\s+/g,''));
  const phone = input.value.trim();
  try{
    await fetch('/.netlify/functions/setup-task-status', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action: 'setPhone', groupName, phone })
    });
  }catch(e){}
  input.style.borderColor = '#6ee7b7';
  setTimeout(() => { input.style.borderColor = ''; }, 1200);
}

async function assignTask(groupName){
  const sel = document.getElementById('assign-' + groupName.replace(/\s+/g,''));
  const task = sel.value;
  if(!task){ alert('Pick a task first.'); return; }
  try{
    await fetch('/.netlify/functions/setup-task-status', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action: 'assign', groupName, task })
    });
  }catch(e){}
  renderAll();
}

async function removeTask(id){
  try{
    await fetch('/.netlify/functions/setup-task-status', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action: 'remove', id })
    });
  }catch(e){}
  renderAll();
}

async function markAllComplete(){
  if(!confirm('Tell every group they can head back? This shows a "Setup Complete" banner on everyone\'s phone and texts anyone with a number on file.')) return;
  try{
    await fetch('/.netlify/functions/setup-task-status', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action: 'markAllComplete' })
    });
  }catch(e){}
  renderAll();
}

async function clearAllComplete(){
  try{
    await fetch('/.netlify/functions/setup-task-status', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action: 'clearAllComplete' })
    });
  }catch(e){}
  renderAll();
}

renderAll();
setInterval(renderAll, 15000);
</script>
</body>
</html>
