<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1"/>
<title>FDM 2026 — Setup Day</title>
<style>
  :root{
    --bg:#0a0f1e; --card:#11182c; --border:rgba(255,255,255,0.08);
    --amber:#f59e0b; --amber-dim:rgba(245,158,11,0.15);
    --text:#f1f5f9; --sub:#94a3b8; --faint:#475569;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; min-height:100vh;}
  .wrap{max-width:520px; margin:0 auto; padding:0 0 60px;}
  .back-btn{display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,0.08); border:none; color:var(--text); font-size:13px; font-weight:700; padding:9px 14px; border-radius:10px; cursor:pointer; margin:16px 16px 0;}
  .hdr{padding:16px 20px 20px; text-align:center;}
  .hdr .eyebrow{font-size:11px; font-weight:800; letter-spacing:0.14em; text-transform:uppercase; color:var(--amber); margin-bottom:6px;}
  .hdr h1{margin:0; font-size:26px; font-weight:900; letter-spacing:-0.01em;}
  .hdr .sub{margin-top:6px; font-size:14px; color:var(--sub);}
  .content{padding:8px 16px 16px;}

  .group-list{display:flex; flex-direction:column; gap:10px;}
  .group-card{display:flex; align-items:center; justify-content:space-between; padding:20px; border-radius:16px; border:1.5px solid var(--border); background:var(--card); cursor:pointer; text-align:left; width:100%; font-size:18px; font-weight:800; color:var(--text);}
  .group-card:active{transform:scale(0.98);}
  .group-arrow{color:var(--faint); font-size:20px;}

  .group-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;}
  .group-name{font-size:24px; font-weight:900;}
  .switch-link{font-size:12px; color:var(--faint); text-decoration:underline; cursor:pointer;}

  .task-card{background:var(--card); border:1.5px solid var(--border); border-radius:16px; padding:18px 20px; margin-bottom:12px;}
  .task-card.done{opacity:0.45;}
  .task-text{font-size:18px; font-weight:800; color:var(--text); margin-bottom:6px; line-height:1.4;}
  .task-detail{font-size:13.5px; color:var(--sub); margin-bottom:6px; line-height:1.5;}
  .task-notes{font-size:13.5px; color:var(--amber); background:rgba(245,158,11,0.08); border-left:3px solid var(--amber); padding:8px 10px; border-radius:6px; margin-bottom:14px; line-height:1.5;}
  .task-btn{width:100%; padding:14px; border-radius:12px; border:none; background:linear-gradient(135deg,#f59e0b,#d97706); color:#1a1000; font-weight:900; font-size:15px; cursor:pointer;}
  .task-done-label{font-size:14px; color:#6ee7b7; font-weight:800;}

  .empty-msg{text-align:center; padding:50px 20px; color:var(--sub); font-size:14px; line-height:1.6;}

  .all-complete-banner{background:linear-gradient(135deg,rgba(16,185,129,0.15),rgba(5,150,105,0.1)); border:2px solid rgba(16,185,129,0.4); border-radius:18px; padding:36px 24px; text-align:center;}
  .all-complete-banner .big{font-size:26px; font-weight:900; color:#6ee7b7; margin-bottom:8px;}
  .all-complete-banner .small{font-size:14px; color:var(--sub);}

  .admin-link{display:block; text-align:center; margin-top:36px; font-size:11px; color:var(--faint); text-decoration:underline;}
</style>
</head>
<body>
<div class="wrap">
  <button class="back-btn" onclick="window.location.href='/hub';">← Back to Hub</button>
  <div class="hdr">
    <div class="eyebrow">Fête de Marquette 2026</div>
    <h1>Setup Day</h1>
    <div class="sub" id="pageSub">Which group are you with?</div>
  </div>

  <div class="content">

    <!-- GROUP PICKER -->
    <div id="groupPicker">
      <div class="group-list" id="groupPickerList"></div>
    </div>

    <!-- GROUP STATUS -->
    <div id="groupStatus" style="display:none;">
      <div class="group-header">
        <div class="group-name" id="myGroupName"></div>
        <span class="switch-link" onclick="clearMyGroup()">Switch group</span>
      </div>
      <div id="allCompleteBanner" style="display:none;" class="all-complete-banner">
        <div class="big">🎉 Setup Complete!</div>
        <div class="small">Great work today — you can head back now.</div>
      </div>
      <div id="myTaskList"></div>
      <div id="noTasksMsg" style="display:none;" class="empty-msg">No tasks assigned yet.<br/>This checks automatically every 10 seconds.</div>
    </div>

    <a class="admin-link" href="/setup-day-admin">Admin →</a>
  </div>
</div>

<script>
const GROUPS = [
  "G1 — Operation Fresh Start (8, Truck 1)",
  "G2 — Wardell + 2 FIPs (Uhaul)",
  "G3 — Steve, Oscar, Mousa, 1 FIP",
  "G4 — 4 FIPs",
  "Electrical — Rob, Bruce J",
];

const TASK_DETAILS = {
  "Left & Right Bank Bars": "10 Bar Sections, 8 6' Tables, 2 4' Tables — 4 bar sections, 4 6' tables, 1 4' table on EACH side (Left and Right).",
  "Cabaret Bar": "4 Bar Sections, 1 6' Table.",
  "Family Fete Bar": "4 Bar Sections, 3 8' Tables, 1 6' Table.",
  "Moon Stage Bar": "8 Bar Sections, 2 8' Tables, 1 6' Table, 1 4' Table. Follow the Moon Stage Bar Set diagram — U-shape with 6' table centered, 2 caddies at the open end.",
  "Lafayette Stage Bar": "4 Bar Sections, 3 8' Tables, 1 6' Table, 4 Cabaret Tables.",
  "Cabaret Tent": "20 Round Tables, 100 Chairs. Set 4 rows (centered to stage) of 4 tables each. 5 chairs per table.",
  "Family Fete Tent": "6 Round Tables, 50 Chairs. Set 2 rows (centered to stage) of 3 tables each. 5 chairs per table.",
  "Lafayette Shade Tents": "40 Round Tables, 200 Chairs. 8 round in each 20x40 tent, 4 in the 20x20 tent (20 tables/100 chairs). Plus 20 more round tables & 100 chairs for general seating, spread 15 ft from stage.",
  "Moon Stage Patio + Tent": "10 Round Tables, 100 Chairs, 20 Cabaret Tables. Set up against the building on the grassy area.",
  "Sun Stage Shade Tents (4)": "32 Round Tables, 160 Chairs. Set 4 rows (along the 40' side) of 5 tables each. Equalize space between tables.",
  "Sun Stage General Seating": "16-18 Round Tables, 400+ Chairs. Set chairs in an arc beginning at the concrete end. Tables behind the chairs, also in an arc. Gary will distribute many leftover chairs.",
  "Lagniappe Stage Seating": "20 Round Tables, 8 Cabaret Tables, 100 Chairs. Set up against the building.",
  "Everything Else Cafe": "4 8' Tables, 6 Cabaret Tables. 8' tables on the sides create 2 bars. 6 cabaret tables along the back, between the table bars.",
  "Prize Wheel": "6 6' Tables, 1 4' Table. Grab needed chairs from the pile.",
  "Hospitality / Grounds": "4 8' + 2 4' Tables → Moon. 4 8' + 2 4' Tables → Sun Stage. 2 8' Tables → Cabaret. 4 8' Tables → Grounds. Grab needed chairs from the 345 pile.",
  "Electrical — Hang Lights": "Hang string lights per the site map.",
  "Trash Cans — Set Out Cans": "Set out garbage cans at each location per the site map.",
  "Bike Racks": "Set out bike racks per the site map.",
  "Bar Sections": "Set out bar sections per the site map.",
};
let pollInterval = null;

function renderGroupPicker(){
  document.getElementById('groupPicker').style.display = 'block';
  document.getElementById('groupStatus').style.display = 'none';
  document.getElementById('pageSub').textContent = 'Which group are you with?';
  document.getElementById('groupPickerList').innerHTML = GROUPS.map(g => `
    <button class="group-card" onclick="selectMyGroup('${g}')">
      ${g}
      <span class="group-arrow">→</span>
    </button>
  `).join('');
}

function selectMyGroup(name){
  localStorage.setItem('fdm-setup-mygroup', name);
  showMyGroupStatus(name);
}

function clearMyGroup(){
  localStorage.removeItem('fdm-setup-mygroup');
  if(pollInterval){ clearInterval(pollInterval); pollInterval = null; }
  renderGroupPicker();
}

async function showMyGroupStatus(name){
  document.getElementById('groupPicker').style.display = 'none';
  document.getElementById('groupStatus').style.display = 'block';
  document.getElementById('pageSub').textContent = 'Your current tasks';
  document.getElementById('myGroupName').textContent = name;
  await pollMyGroupStatus(name);
  if(pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(() => pollMyGroupStatus(name), 10000);
}

async function pollMyGroupStatus(name){
  let assignments;
  try{
    const res = await fetch('/.netlify/functions/setup-task-status');
    const data = await res.json();
    assignments = data.assignments || [];
  }catch(e){ return; } // network hiccup — keep showing last known state

  const dayComplete = assignments.some(a => a.groupName === 'ALL' && a.task === 'DAY_COMPLETE' && a.status === 'DONE');
  document.getElementById('allCompleteBanner').style.display = dayComplete ? 'block' : 'none';

  const mine = assignments.filter(a => a.groupName === name);
  const listEl = document.getElementById('myTaskList');
  const noTasksMsg = document.getElementById('noTasksMsg');

  if(mine.length === 0){
    listEl.innerHTML = '';
    noTasksMsg.style.display = dayComplete ? 'none' : 'block';
    return;
  }
  noTasksMsg.style.display = 'none';

  const active = mine.filter(a => a.status !== 'DONE');
  const done = mine.filter(a => a.status === 'DONE');

  listEl.innerHTML = [...active, ...done].map(a => `
    <div class="task-card ${a.status === 'DONE' ? 'done' : ''}">
      <div class="task-text">${a.task}</div>
      ${TASK_DETAILS[a.task] ? `<div class="task-detail">${TASK_DETAILS[a.task]}</div>` : ''}
      ${a.notes ? `<div class="task-notes">📌 ${a.notes}</div>` : ''}
      ${a.status === 'DONE'
        ? '<div class="task-done-label">✓ Marked Done</div>'
        : `<button class="task-btn" onclick="markComplete('${a.id}', '${name}')">✅ Mark Task Complete</button>`}
    </div>
  `).join('');
}

async function markComplete(id, name){
  try{
    await fetch('/.netlify/functions/setup-task-status', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action: 'complete', id })
    });
  }catch(e){}
  pollMyGroupStatus(name);
}

// Init
// ═══ FDM 2026 IS OVER — set to false when reactivating for the 2027 festival ═══
const DORMANT = true;
if (DORMANT) {
  document.body.innerHTML = `
    <div style="min-height:100vh;background:#0a0a14;color:#f1f5f9;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;font-family:-apple-system,sans-serif;">
      <div style="font-size:56px;margin-bottom:16px;">🎪</div>
      <div style="font-size:24px;font-weight:900;margin-bottom:10px;">Fête de Marquette 2026 Has Wrapped!</div>
      <div style="font-size:15px;color:#94a3b8;max-width:400px;line-height:1.6;">Thanks for an incredible festival. Setup Day is now closed for the season — see you in 2027!</div>
    </div>`;
} else {
  const savedGroup = localStorage.getItem('fdm-setup-mygroup');
  if(savedGroup) showMyGroupStatus(savedGroup);
  else renderGroupPicker();
}
</script>
</body>
</html>
