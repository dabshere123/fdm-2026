OUTPUT
            <option>Stage Manager — Moon Stage</option>
            <option>Stage Manager — Lafayette</option>
            <option>Stage Manager — Lagniappe</option>
            <option>Stage Manager — Sun Stage</option>
            <option>Stage Manager — Cabaret</option>
          </optgroup>
          <optgroup label="Other Roles">
            <option>Tent Manager</option>
            <option>Merch Tent Manager</option>
            <option>Greeter Supervisor</option>
            <option>Greeter — Few</option>
            <option>Greeter — Ingersoll Left</option>
            <option>Greeter — Ingersoll Right</option>
            <option>Med Unit 1</option>
            <option>Med Unit 2</option>
            <option>Admin 1</option>
            <option>Admin 2</option>
            <option>Financial 1</option>
            <option>Financial 2</option>
            <option>Financial 3</option>
            <option>Financial 4</option>
            <option>Marketing</option>
            <option>Vendor</option>
            <option>Other</option>
          </optgroup>
        </select>
      </div>

      <!-- LOCATION -->
      <div class="field">
        <label>Your Location *</label>
        <select id="flocation">
          <option value="">Select your location...</option>
          <option>Moon Stage 1</option><option>Moon Stage 2</option>
          <option>Lafayette</option><option>Lagniappe</option>
          <option>Sun Left</option><option>Sun Right</option><option>Cabaret</option>
          <option>Med Unit 1</option><option>Med Unit 2</option>
          <option>Admin</option><option>Financial</option><option>Marketing</option>
          <option>Merch Tent</option><option>Hospitality</option>
          <option>Greeter — Few</option><option>Greeter — Ingersoll Left</option><option>Greeter — Ingersoll Right</option>
          <option>Other</option>
        </select>
      </div>

      <!-- PHONE -->
      <div class="field">
        <label>Cell Phone Number *</label>
        <input type="tel" id="fphone" placeholder="(608) 555-1234"/>
      </div>

      <!-- DAYS -->
      <div class="field">
        <label>Days & Times You Are Working *</label>

        <div class="day-card" id="card-thu">
          <button class="day-header" onclick="toggleDay('thu')">
            <div class="checkbox" id="chk-thu"></div>
            <div class="day-label">Thursday, July 9</div>
          </button>
          <div class="times hidden" id="times-thu">
            <div class="field"><label>Start Time</label>
              <select id="start-thu" onchange="checkForm()"><option value="">Select...</option></select>
            </div>
            <div class="field"><label>End Time</label>
              <select id="end-thu" onchange="checkForm()"><option value="">Select...</option></select>
            </div>
          </div>
        </div>

        <div class="day-card" id="card-fri">
          <button class="day-header" onclick="toggleDay('fri')">
            <div class="checkbox" id="chk-fri"></div>
            <div class="day-label">Friday, July 10</div>
          </button>
          <div class="times hidden" id="times-fri">
            <div class="field"><label>Start Time</label>
              <select id="start-fri" onchange="checkForm()"><option value="">Select...</option></select>
            </div>
            <div class="field"><label>End Time</label>
              <select id="end-fri" onchange="checkForm()"><option value="">Select...</option></select>
            </div>
          </div>
        </div>

        <div class="day-card" id="card-sat">
          <button class="day-header" onclick="toggleDay('sat')">
            <div class="checkbox" id="chk-sat"></div>
            <div class="day-label">Saturday, July 11</div>
          </button>
          <div class="times hidden" id="times-sat">
            <div class="field"><label>Start Time</label>
              <select id="start-sat" onchange="checkForm()"><option value="">Select...</option></select>
            </div>
            <div class="field"><label>End Time</label>
              <select id="end-sat" onchange="checkForm()"><option value="">Select...</option></select>
            </div>
          </div>
        </div>

        <div class="day-card" id="card-sun">
          <button class="day-header" onclick="toggleDay('sun')">
            <div class="checkbox" id="chk-sun"></div>
            <div class="day-label">Sunday, July 12</div>
          </button>
          <div class="times hidden" id="times-sun">
            <div class="field"><label>Start Time</label>
              <select id="start-sun" onchange="checkForm()"><option value="">Select...</option></select>
            </div>
            <div class="field"><label>End Time</label>
              <select id="end-sun" onchange="checkForm()"><option value="">Select...</option></select>
            </div>
          </div>
        </div>
      </div>

      <!-- GROUPME -->
      <div class="field">
        <label>Are you on GroupMe?</label>
        <div class="groupme-btns">
          <button class="gm-btn" id="gm-yes" onclick="setGroupme('yes')">✅ Yes</button>
          <button class="gm-btn" id="gm-no" onclick="setGroupme('no')">❌ No</button>
        </div>
        <div id="gm-username" class="hidden" style="margin-top:8px;">
          <div class="field" style="position:relative;">
            <label>GroupMe Username</label>
            <span style="position:absolute;left:14px;bottom:14px;color:#64748b;font-size:16px;font-weight:700;">@</span>
            <input type="text" id="fgroupme" placeholder="your_username" style="padding-left:28px;"/>
          </div>
        </div>
      </div>

      <!-- APPROVAL CODE -->
      <div class="field">
        <label>Approval Code <span style="color:#475569;text-transform:none;font-size:10px;letter-spacing:0;">(optional — skip the review queue)</span></label>
        <input type="text" id="fcode" placeholder="Enter code if you have one" oninput="checkCode()"/>
        <div id="code-msg" style="display:none;" class="code-valid"></div>
      </div>

      <!-- SUBMIT -->
      <button class="submit-btn" id="submitBtn" disabled onclick="submitForm()">Fill in all fields above to register</button>
      <div class="hint">Your information is used only for Fête de Marquette event operations.</div>
    </div>

    <!-- SUCCESS -->
    <div class="success" id="successDiv">
      <div style="font-size:72px;margin-bottom:16px;">🎪</div>
      <div style="font-size:28px;font-weight:900;color:#10b981;margin-bottom:8px;">You're Registered!</div>
      <div id="successName" style="font-size:17px;font-weight:700;margin-bottom:20px;"></div>
      <div id="successStatus" style="font-size:14px;line-height:1.7;border-radius:12px;padding:14px 16px;margin-bottom:20px;"></div>
      <a href="/" style="display:block;padding:14px;border-radius:12px;background:rgba(245,158,11,0.1);border:2px solid rgba(245,158,11,0.4);color:#f59e0b;font-size:14px;font-weight:700;text-decoration:none;margin-bottom:8px;">← Back to Launcher</a>
      <button onclick="resetForm()" style="width:100%;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:#64748b;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">Register Another Person</button>
    </div>
  </div>

  <script>
    const TIMES = ["6:00 AM","6:30 AM","7:00 AM","7:30 AM","8:00 AM","8:30 AM","9:00 AM","9:30 AM","10:00 AM","10:30 AM","11:00 AM","11:30 AM","12:00 PM","12:30 PM","1:00 PM","1:30 PM","2:00 PM","2:30 PM","3:00 PM","3:30 PM","4:00 PM","4:30 PM","5:00 PM","5:30 PM","6:00 PM","6:30 PM","7:00 PM","7:30 PM","8:00 PM","8:30 PM","9:00 PM","9:30 PM","10:00 PM","10:30 PM","11:00 PM","11:30 PM"];
    const DEFAULTS = {thu:{start:"4:00 PM",end:"11:00 PM"},fri:{start:"4:00 PM",end:"11:00 PM"},sat:{start:"12:00 PM",end:"11:00 PM"},sun:{start:"10:00 AM",end:"9:00 PM"}};
    const CODES = ["FDM2026","FETE26","MARQUETTE"];
    const days = ['thu','fri','sat','sun'];
    const selected = {};

    // Populate time dropdowns
    days.forEach(d => {
      ['start','end'].forEach(t => {
        const sel = document.getElementById(`${t}-${d}`);
        TIMES.forEach(time => {
          const opt = document.createElement('option');
          opt.value = time; opt.textContent = time;
          sel.appendChild(opt);
        });
      });
    });

    function toggleDay(d) {
      selected[d] = !selected[d];
      const card = document.getElementById(`card-${d}`);
      const chk = document.getElementById(`chk-${d}`);
      const times = document.getElementById(`times-${d}`);
      if (selected[d]) {
        card.classList.add('selected');
        chk.textContent = '✓';
        times.classList.remove('hidden');
        document.getElementById(`start-${d}`).value = DEFAULTS[d].start;
        document.getElementById(`end-${d}`).value = DEFAULTS[d].end;
      } else {
        card.classList.remove('selected');
        chk.textContent = '';
        times.classList.add('hidden');
      }
      checkForm();
    }

    function setGroupme(val) {
      document.getElementById('gm-yes').classList.toggle('active', val==='yes');
      document.getElementById('gm-no').classList.toggle('active', val==='no');
      document.getElementById('gm-username').classList.toggle('hidden', val!=='yes');
      document.getElementById('gm-yes').dataset.val = val;
      checkForm();
    }

    function checkCode() {
      const code = document.getElementById('fcode').value.toUpperCase().trim();
      const msg = document.getElementById('code-msg');
      if (!code) { msg.style.display='none'; return; }
      if (CODES.includes(code)) {
        msg.style.display='block'; msg.style.color='#10b981';
        msg.textContent = '✅ Valid — you\'ll be approved instantly and receive your app link';
      } else {
        msg.style.display='block'; msg.style.color='#f59e0b';
        msg.textContent = '⏳ Code not recognized — registration will go to the pending queue';
      }
      checkForm();
    }

    function formatPhone(v) {
      const d = v.replace(/\D/g,'').slice(0,10);
      if(d.length<=3) return d;
      if(d.length<=6) return `(${d.slice(0,3)}) ${d.slice(3)}`;
      return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
    }

    document.getElementById('fphone').addEventListener('input', function() {
      this.value = formatPhone(this.value);
      checkForm();
    });

    ['fname','frole','flocation'].forEach(id => {
      document.getElementById(id).addEventListener('input', checkForm);
      document.getElementById(id).addEventListener('change', checkForm);
    });

    function checkForm() {
      const name = document.getElementById('fname').value.trim();
      const role = document.getElementById('frole').value;
      const loc = document.getElementById('flocation').value;
      const phone = document.getElementById('fphone').value.replace(/\D/g,'');
      const anyDay = days.some(d => selected[d]);
      const allTimes = days.filter(d=>selected[d]).every(d =>
        document.getElementById(`start-${d}`).value && document.getElementById(`end-${d}`).value
      );
      const ok = name && role && loc && phone.length>=10 && anyDay && allTimes;
      const btn = document.getElementById('submitBtn');
      btn.disabled = !ok;
      btn.textContent = ok ? '🎪 REGISTER FOR FÊTE 2026' : 'Fill in all fields above to register';
    }

    function submitForm() {
      const name = document.getElementById('fname').value.trim();
      const code = document.getElementById('fcode').value.toUpperCase().trim();
      const approved = CODES.includes(code);
      const phone = document.getElementById('fphone').value;

      document.getElementById('formWrap').classList.add('hide');
      const s = document.getElementById('successDiv');
      s.classList.add('show');
      document.getElementById('successName').textContent = name;

      const statusDiv = document.getElementById('successStatus');
      if (approved) {
        statusDiv.style.background = 'rgba(16,185,129,0.08)';
        statusDiv.style.border = '1px solid rgba(16,185,129,0.3)';
        statusDiv.style.color = '#10b981';
        statusDiv.textContent = `✅ You are approved! Your app link and worker guide have been sent to ${phone} via SMS. Add it to your home screen and you are ready to go.`;
      } else {
        statusDiv.style.background = 'rgba(255,255,255,0.04)';
        statusDiv.style.border = '1px solid rgba(255,255,255,0.08)';
        statusDiv.style.color = '#94a3b8';
        statusDiv.textContent = '⏳ Your registration is pending review. You will receive your app link via SMS once approved. Keep your phone handy!';
      }
    }

    function resetForm() {
      document.getElementById('formWrap').classList.remove('hide');
      document.getElementById('successDiv').classList.remove('show');
      document.getElementById('fname').value='';
      document.getElementById('frole').value='';
      document.getElementById('flocation').value='';
      document.getElementById('fphone').value='';
      document.getElementById('fcode').value='';
      document.getElementById('code-msg').style.display='none';
      days.forEach(d=>{ if(selected[d]) toggleDay(d); });
      setGroupme('');
      checkForm();
    }
  </script>
</body>
</html>
